<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oraculo Chat</title>
    <style>
        :root {
            --bg: #f6f7f9;
            --panel: #ffffff;
            --text: #171717;
            --muted: #676f78;
            --line: #d9dde3;
            --primary: #0f766e;
            --primary-strong: #115e59;
            --danger: #be123c;
            --bot: #eef7f5;
            --user: #171717;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        button {
            border: 0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }

        button:disabled {
            cursor: wait;
            opacity: 0.7;
        }

        .shell {
            display: grid;
            grid-template-columns: minmax(260px, 340px) minmax(0, 1fr);
            min-height: 100vh;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
            border-right: 1px solid var(--line);
            background: var(--panel);
            padding: 28px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mark {
            display: grid;
            width: 42px;
            height: 42px;
            place-items: center;
            border-radius: 8px;
            background: var(--primary);
            color: #ffffff;
            font-weight: 800;
        }

        h1,
        h2,
        p {
            margin: 0;
        }

        h1 {
            font-size: 1.35rem;
            line-height: 1.2;
        }

        h2 {
            font-size: 1rem;
        }

        .muted {
            color: var(--muted);
            font-size: 0.94rem;
            line-height: 1.45;
        }

        .upload-form {
            display: grid;
            gap: 12px;
        }

        label {
            display: grid;
            gap: 7px;
            color: var(--muted);
            font-size: 0.92rem;
            font-weight: 700;
        }

        input,
        select,
        textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
            color: var(--text);
            outline: none;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
        }

        input,
        select {
            min-height: 44px;
            padding: 10px 12px;
        }

        .primary-btn {
            min-height: 44px;
            background: var(--primary);
            color: #ffffff;
        }

        .primary-btn:hover {
            background: var(--primary-strong);
        }

        .status {
            min-height: 22px;
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.35;
        }

        .status.error {
            color: var(--danger);
        }

        .hidden {
            display: none;
        }

        .chat {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            min-width: 0;
            min-height: 100vh;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 1px solid var(--line);
            background: #ffffff;
            padding: 22px 28px;
        }

        .chat-header p {
            margin-top: 4px;
        }

        .messages {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            padding: 28px;
        }

        .message {
            max-width: min(720px, 88%);
            border-radius: 8px;
            padding: 12px 14px;
            line-height: 1.5;
            overflow-wrap: anywhere;
            white-space: pre-wrap;
        }

        .message.bot {
            align-self: flex-start;
            border: 1px solid #cce6e1;
            background: var(--bot);
        }

        .message.user {
            align-self: flex-end;
            background: var(--user);
            color: #ffffff;
        }

        .message.system {
            align-self: center;
            max-width: min(620px, 96%);
            border: 1px solid var(--line);
            background: #ffffff;
            color: var(--muted);
            text-align: center;
            font-size: 0.92rem;
        }

        .composer {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            border-top: 1px solid var(--line);
            background: #ffffff;
            padding: 18px 28px;
        }

        textarea {
            min-height: 48px;
            max-height: 150px;
            resize: vertical;
            padding: 13px 14px;
        }

        .send-btn {
            min-width: 112px;
            min-height: 48px;
            background: var(--text);
            color: #ffffff;
        }

        .send-btn:hover {
            background: #2b2b2b;
        }

        @media (max-width: 760px) {
            .shell {
                grid-template-columns: 1fr;
            }

            .sidebar {
                border-right: 0;
                border-bottom: 1px solid var(--line);
                padding: 22px;
            }

            .chat {
                min-height: 72vh;
            }

            .chat-header,
            .messages,
            .composer {
                padding-left: 18px;
                padding-right: 18px;
            }

            .chat-header {
                align-items: flex-start;
                flex-direction: column;
            }

            .composer {
                grid-template-columns: 1fr;
            }

            .send-btn {
                width: 100%;
            }

            .message {
                max-width: 96%;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <aside class="sidebar" aria-label="Envio de documentos">
            <div class="brand">
                <div class="mark" aria-hidden="true">O</div>
                <div>
                    <h1>Oraculo</h1>
                    <p class="muted">Chat de teste com documentos.</p>
                </div>
            </div>

            <section>
                <h2>Enviar conteudo</h2>
                <p class="muted">Use arquivo, site ou video para alimentar a base antes de perguntar.</p>
            </section>

            <form class="upload-form" id="uploadForm">
                <label for="tipo">
                    Tipo
                    <select id="tipo" name="tipo" required>
                        <option value="pdf">PDF</option>
                        <option value="txt">TXT</option>
                        <option value="csv">CSV</option>
                        <option value="site">Site</option>
                        <option value="video">Video / YouTube</option>
                    </select>
                </label>

                <label for="file" id="fileField">
                    Arquivo
                    <input id="file" name="file" type="file" accept=".pdf,.txt,.csv" required>
                </label>

                <label for="url" id="urlField" class="hidden">
                    URL
                    <input id="url" name="url" type="url" placeholder="https://..." autocomplete="url">
                </label>

                <button class="primary-btn" id="uploadButton" type="submit">Processar conteudo</button>
                <p class="status" id="uploadStatus" role="status"></p>
            </form>
        </aside>

        <section class="chat" aria-label="Chat">
            <header class="chat-header">
                <div>
                    <h2>Converse com o Oraculo</h2>
                    <p class="muted">Pergunte algo depois de enviar um documento.</p>
                </div>
            </header>

            <div class="messages" id="messages" aria-live="polite">
                <div class="message bot">Ola. Envie um arquivo e me pergunte alguma coisa sobre ele.</div>
            </div>

            <form class="composer" id="chatForm">
                <textarea id="messageInput" name="message" placeholder="Digite sua pergunta..." required></textarea>
                <button class="send-btn" id="sendButton" type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <script>
        const chatUrl = "{% url 'chat' %}";
        const uploadUrl = "{% url 'upload_document' %}";
        const messages = document.querySelector("#messages");
        const chatForm = document.querySelector("#chatForm");
        const uploadForm = document.querySelector("#uploadForm");
        const messageInput = document.querySelector("#messageInput");
        const sendButton = document.querySelector("#sendButton");
        const uploadButton = document.querySelector("#uploadButton");
        const uploadStatus = document.querySelector("#uploadStatus");
        const fileInput = document.querySelector("#file");
        const urlInput = document.querySelector("#url");
        const fileField = document.querySelector("#fileField");
        const urlField = document.querySelector("#urlField");
        const tipoInput = document.querySelector("#tipo");
        const urlTypes = new Set(["site", "video"]);
        let currentDocumentId = null;
        let currentFilename = null;

        function addMessage(text, type) {
            const bubble = document.createElement("div");
            bubble.className = `message ${type}`;
            bubble.textContent = text;
            messages.appendChild(bubble);
            messages.scrollTop = messages.scrollHeight;
        }

        async function readJson(response) {
            const text = await response.text();

            try {
                return text ? JSON.parse(text) : {};
            } catch {
                return { error: text || "Resposta inesperada do servidor" };
            }
        }

        function updateSourceFields() {
            const usesUrl = urlTypes.has(tipoInput.value);

            fileField.classList.toggle("hidden", usesUrl);
            urlField.classList.toggle("hidden", !usesUrl);
            fileInput.required = !usesUrl;
            urlInput.required = usesUrl;

            if (usesUrl) {
                fileInput.value = "";
            } else {
                urlInput.value = "";
            }
        }

        tipoInput.addEventListener("change", updateSourceFields);

        fileInput.addEventListener("change", () => {
            const file = fileInput.files[0];

            if (!file) {
                return;
            }

            const ext = file.name.split(".").pop().toLowerCase();

            if (["pdf", "txt", "csv"].includes(ext)) {
                tipoInput.value = ext;
                updateSourceFields();
            }
        });

        uploadForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            uploadStatus.textContent = "Processando arquivo...";
            uploadStatus.classList.remove("error");
            uploadButton.disabled = true;

            const formData = new FormData(uploadForm);
            const selectedFile = fileInput.files[0];
            const selectedUrl = urlInput.value.trim();

            try {
                const response = await fetch(uploadUrl, {
                    method: "POST",
                    body: formData,
                });
                const data = await readJson(response);

                if (!response.ok) {
                    throw new Error(data.error || "Falha ao processar arquivo");
                }

                currentDocumentId = data.document_id || null;
                currentFilename = data.filename || (selectedFile ? selectedFile.name : selectedUrl);
                uploadStatus.textContent = `${data.status || "Documento processado"}: ${currentFilename} (${data.stored_points || 0} pontos)`;
                addMessage(`Conteudo "${currentFilename}" processado com ${data.stored_points || 0} pontos.`, "system");
                uploadForm.reset();
                updateSourceFields();
            } catch (error) {
                uploadStatus.textContent = error.message;
                uploadStatus.classList.add("error");
            } finally {
                uploadButton.disabled = false;
            }
        });

        chatForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            const message = messageInput.value.trim();

            if (!message) {
                return;
            }

            addMessage(message, "user");
            messageInput.value = "";
            sendButton.disabled = true;
            addMessage("Pensando...", "system");
            const thinking = messages.lastElementChild;
            const payload = { message };

            if (currentDocumentId) {
                payload.document_id = currentDocumentId;
            }

            try {
                const response = await fetch(chatUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(payload),
                });
                const data = await readJson(response);

                thinking.remove();

                if (!response.ok) {
                    throw new Error(data.error || "Falha ao enviar mensagem");
                }

                addMessage(data.resposta || "Sem resposta.", "bot");
            } catch (error) {
                thinking.remove();
                addMessage(error.message, "system");
            } finally {
                sendButton.disabled = false;
                messageInput.focus();
            }
        });

        messageInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                chatForm.requestSubmit();
            }
        });

        updateSourceFields();
    </script>
</body>
</html>
